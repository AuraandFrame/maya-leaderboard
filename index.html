<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maya in Moments — Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
      height: 100%; 
      font-family: 'Lato', sans-serif; 
      background: linear-gradient(180deg, #FFF4EC 0%, #F5E8F5 40%, #E8E0F0 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page { 
      max-width: 700px; 
      margin: 0 auto; 
      padding: 40px 24px 220px;
      min-height: 100vh; 
      position: relative; 
      z-index: 2;
    }

    .mountain-wrap {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      height: 200px;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }

    .mountain-wrap svg {
      width: 100%;
      height: 100%;
      display: block;
      preserveAspectRatio: none;
    }

    .brand-header { text-align: center; margin-bottom: 10px; }
    .brand-title {
      font-family: 'Playfair Display', serif; font-size: 38px; font-weight: 700;
      background: linear-gradient(135deg, #FECC6C 0%, #FCBA7B 40%, #BE99CA 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.1;
    }
    .brand-sub { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #6B4E8A; margin-top: 6px; }

    .section-label { text-align: center; font-family: 'Playfair Display', serif; font-size: 16px; color: #6B4E8A; margin: 18px 0 20px; }

    .stats-row { display: flex; justify-content: center; gap: 16px; margin-bottom: 24px; }
    .stat-pill { background: rgba(255,255,255,0.75); border: 1px solid rgba(107,78,138,0.2); border-radius: 20px; padding: 6px 18px; font-size: 13px; color: #6B4E8A; font-weight: 700; }
    .stat-pill span { color: #B8740A; font-family: 'Playfair Display', serif; font-size: 16px; }

    .leaderboard-list { display: flex; flex-direction: column; gap: 12px; }

    .leader-row { display: flex; align-items: center; gap: 14px; background: rgba(255,255,255,0.78); border-radius: 12px; padding: 16px 20px; border: 1px solid rgba(190,153,202,0.25); }
    .leader-row.rank-1 { background: linear-gradient(135deg, rgba(254,204,108,0.4), rgba(252,186,123,0.3)); border: 1.5px solid rgba(254,204,108,0.65); box-shadow: 0 3px 16px rgba(254,204,108,0.22); padding: 20px; }

    .rank-badge { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; flex-shrink: 0; }
    .rank-1 .rank-badge { background: linear-gradient(135deg, #FECC6C, #FCBA7B); color: #2E2C2C; }
    .rank-2 .rank-badge { background: rgba(207,158,188,0.35); color: #6B4E8A; }
    .rank-3 .rank-badge { background: rgba(242,171,151,0.35); color: #7D4030; }
    .rank-4 .rank-badge, .rank-5 .rank-badge { background: rgba(159,150,132,0.18); color: #6B6B6B; }

    .player-name { flex: 1; font-family: 'Playfair Display', serif; font-size: 20px; color: #2E2C2C; }
    .rank-1 .player-name { font-size: 23px; font-weight: 700; }

    .player-score { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: #6B4E8A; }
    .rank-1 .player-score { font-size: 26px; color: #B8740A; }
    .score-label { font-size: 10px; color: #9F9684; text-align: right; text-transform: uppercase; letter-spacing: 0.08em; }
    .score-wrap { text-align: right; }

    .crown { font-size: 16px; margin-left: 6px; }

    .more-badge { text-align: center; margin-top: 18px; }
    .more-pill { display: inline-block; background: rgba(107,78,138,0.12); border-radius: 20px; padding: 6px 20px; font-size: 13px; color: #6B4E8A; font-weight: 700; }

    .empty-state { text-align: center; padding: 60px 20px; color: #BE99CA; font-family: 'Playfair Display', serif; font-size: 18px; }
    .empty-sub { font-family: 'Lato', sans-serif; font-size: 13px; color: #CF9EBC; margin-top: 10px; }

    .live-dot { display: inline-block; width: 8px; height: 8px; background: #6B4E8A; border-radius: 50%; margin-right: 6px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>

      <div class="brand-sub"><span class="live-dot"></span>Cash Cube · Live Rankings</div>

    <div class="section-label">Top 5 — Live Rankings</div>

    <div class="stats-row" id="stats-row" style="display:none">
      <div class="stat-pill">Players: <span id="total-count">0</span></div>
      <div class="stat-pill">Top Score: <span id="top-score">$0</span></div>

  <script>
    const SUPABASE_URL = 'https://auitwromplrdpyfvxikm.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_iVFHksRMyx95dglqOG2F0A_2Sf0vGUf';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allPlayers = [];

    function fmt(s) { return '$' + parseFloat(s).toFixed(2); }

    function render() {
      const sorted = [...allPlayers].sort((a, b) => b.score - a.score);
      const top5 = sorted.slice(0, 5);
      const rest = sorted.length - 5;

      const statsRow = document.getElementById('stats-row');
      const display = document.getElementById('leaderboard-display');
      const moreBadge = document.getElementById('more-badge');

      if (allPlayers.length === 0) {
        display.innerHTML = '<div class="empty-state">No scores yet<div class="empty-sub">Scores will appear here as players compete</div></div>';
        statsRow.style.display = 'none';
        moreBadge.style.display = 'none';
        return;
      }

      statsRow.style.display = 'flex';
      document.getElementById('total-count').textContent = allPlayers.length;
      document.getElementById('top-score').textContent = fmt(sorted[0].score);

      const rankClasses = ['rank-1','rank-2','rank-3','rank-4','rank-5'];
      display.innerHTML = '<div class="leaderboard-list">' + top5.map((p, i) => {
        const rc = rankClasses[i];
        const crown = i === 0 ? '<span class="crown">&#9733;</span>' : '';
        return `<div class="leader-row ${rc}">
          <div class="rank-badge">${i+1}</div>
          <div class="player-name">${p.name}${crown}</div>
          <div class="score-wrap">
            <div class="player-score">${fmt(p.score)}</div>
            <div class="score-label">score</div>
          </div>
        </div>`;
      }).join('') + '</div>';

      if (rest > 0) {
        moreBadge.style.display = 'block';
        moreBadge.innerHTML = `<span class="more-pill">+${rest} more player${rest !== 1 ? 's' : ''} competing</span>`;
      } else {
        moreBadge.style.display = 'none';
      }
    }

    async function loadPlayers() {
      const { data, error } = await sb.from('players').select('*');
      if (error) { console.error(error); return; }
      allPlayers = data || [];
      render();
    }

    // Real-time subscription
    const channel = sb.channel('realtime-players')
      .on('postgres_changes', { 
        event: '*', 
        schema: 'public', 
        table: 'players' 
      }, (payload) => {
        console.log('Change received:', payload);
        loadPlayers();
      })
      .subscribe((status) => {
        console.log('Realtime status:', status);
      });

    // Also poll every 5 seconds as fallback
    loadPlayers();
    setInterval(loadPlayers, 5000);
  </script>
